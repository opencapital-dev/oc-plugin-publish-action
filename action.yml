name: "OpenCapital plugin publish"
description: "Assemble + sign + push a Grafana plugin to GHCR plugins-staging"
inputs:
  dir:
    required: true
    default: "."
    description: "Path to the plugin source directory (must contain dist/)"
  id:
    required: true
    description: "Plugin id (OCI repository name, e.g. oc-core-datasource)"
  owner:
    required: true
    description: "GitHub owner/org (target: ghcr.io/<owner>/plugins-staging/<id>)"
  version:
    required: true
    description: "OCI tag, e.g. v0.1.0"
  platforms:
    required: false
    default: "linux-amd64,linux-arm64,darwin-amd64,darwin-arm64,windows-amd64"
    description: "Comma-separated list of platforms to include"
  catalog-repo:
    required: false
    default: "opencapital-dev/opencapital"
    description: "owner/repo holding plugins.json (the marketplace catalog)."
  catalog-channel:
    required: false
    default: "plugins"
    description: >-
      Channel the auto-PR adds the version to: 'plugins' (productive; merge =
      live) or 'preview' (test channel; promote later).
  catalog-token:
    required: false
    default: ""
    description: >-
      PAT/App token with contents:write + pull-requests:write on catalog-repo,
      used to open the catalog PR cross-repo. When empty, the PR step is skipped
      (the artifact is still published + signed to plugins-staging).
outputs:
  digest:
    description: "Pushed manifest digest (sha256:...)"
    value: ${{ steps.push.outputs.digest }}
runs:
  using: composite
  steps:
    # cosign uploads the signature referrer to GHCR, so the runner needs registry
    # auth (keyless OIDC only handles the Fulcio cert, not the blob push). This is
    # the canonical GitHub-native pattern; cosign reads the docker config it writes.
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - id: push
      shell: bash
      env:
        GHCR_TOKEN: ${{ github.token }}
      run: |
        # Build the assembler in its OWN module dir (it is a separate module);
        # `go run <path>` from the plugin's module rejects an out-of-module path.
        ( cd "${{ github.action_path }}/assemble" && go build -o "${{ runner.temp }}/oc-assemble" . )
        digest=$("${{ runner.temp }}/oc-assemble" \
          -dir "${{ inputs.dir }}" \
          -id "${{ inputs.id }}" \
          -owner "${{ inputs.owner }}" \
          -version "${{ inputs.version }}" \
          -platforms "${{ inputs.platforms }}")
        echo "digest=$digest" >> "$GITHUB_OUTPUT"
        echo "DIGEST=$digest" >> "$GITHUB_ENV"
    # --new-bundle-format (the v0.3 sigstore bundle referrer control-plane verifies)
    # is a cosign v3.x flag. cosign v3.x ships no detached .sig asset, so
    # sigstore/cosign-installer cannot verify it; install the official v3.0.6 binary
    # directly over HTTPS instead.
    - name: install cosign v3.0.6
      shell: bash
      run: |
        curl -fsSL -o "${{ runner.temp }}/cosign" \
          https://github.com/sigstore/cosign/releases/download/v3.0.6/cosign-linux-amd64
        chmod +x "${{ runner.temp }}/cosign"
        echo "${{ runner.temp }}" >> "$GITHUB_PATH"
    - shell: bash
      run: |
        cosign version
        cosign sign --yes --new-bundle-format \
          "ghcr.io/${{ inputs.owner }}/plugins-staging/${{ inputs.id }}@${DIGEST}"
    # Bridge publish -> catalog: open a PR on catalog-repo adding this version to
    # plugins.json. Merging it triggers plugin-promote-reconcile (signature- +
    # footprint-gated) which promotes staging -> trusted. Skipped if no token.
    - name: open catalog PR
      shell: bash
      env:
        ID: ${{ inputs.id }}
        VERSION: ${{ inputs.version }}
        CATALOG_REPO: ${{ inputs.catalog-repo }}
        CATALOG_CHANNEL: ${{ inputs.catalog-channel }}
        CATALOG_TOKEN: ${{ inputs.catalog-token }}
      run: bash "${{ github.action_path }}/catalog-pr.sh"
